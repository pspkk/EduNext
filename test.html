<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>EduForword - Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="img/logo6.png">
    
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
        /* ซ่อน Scrollbar สำหรับส่วนที่ยาวเกิน */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="bg-white text-zinc-900 antialiased">

<nav class="fixed top-0 w-full z-[100] bg-white/80 backdrop-blur-md border-b border-zinc-200">
    <div class="flex justify-between items-center px-4 py-3 md:px-6 md:py-4 max-w-7xl mx-auto">
        <div class="flex-shrink-0 font-bold text-xl md:text-2xl tracking-tighter">
            <a href="./index.html" class="flex items-center gap-2">
                <img src="img/logo2.png" class="h-7 md:h-9 w-auto" alt="Logo">
                <span>EduForword</span>
            </a>
        </div>
        <div class="flex items-center gap-2 md:gap-4 text-sm font-medium">
            <a href="./test.html" class="px-2 py-1 text-red-600">Archive</a>
            <a href="./index.html#about-section" class="px-2 py-1 text-zinc-600">About</a>
            <a href="#" class="px-4 py-2 bg-red-600 text-white rounded-full text-xs font-bold">Contact</a>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 md:px-6 pt-24 md:pt-32 pb-12">
    
    <div class="flex flex-col md:flex-row gap-6 md:gap-10">
        
        <aside class="w-full md:w-1/4">
    <div class="bg-zinc-50 border border-zinc-200 rounded-2xl p-5 md:sticky md:top-28 shadow-sm">
        
        <div class="flex justify-between items-center mb-4 md:mb-6">
            <h2 class="font-extrabold text-lg tracking-tight flex items-center gap-2">
                <span class="material-symbols-outlined text-red-600">tune</span>
                Filters
            </h2>
            <button onclick="document.getElementById('filter-inner').classList.toggle('hidden')" 
                    class="md:hidden flex items-center gap-1 bg-white border border-zinc-300 px-3 py-1.5 rounded-lg text-xs font-bold active:scale-95 transition-transform">
                ตัวกรอง/ค้นหา
            </button>
        </div>

        <div id="filter-inner" class="hidden md:flex flex-col gap-5">
            
            <div>
                <label class="block text-[10px] font-black uppercase text-zinc-400 mb-2 tracking-widest">Search</label>
                <input type="text" id="search-input" placeholder="Title..." 
                       class="w-full p-2.5 bg-white border border-zinc-300 rounded-xl text-sm focus:ring-2 focus:ring-red-600/10 focus:border-red-600 outline-none transition-all">
            </div>
            
            <div>
                <label class="block text-[10px] font-black uppercase text-zinc-400 mb-2 tracking-widest">Year</label>
                <select id="year-filter" class="w-full p-2.5 bg-white border border-zinc-300 rounded-xl text-sm outline-none cursor-pointer focus:border-red-600">
                    <option value="all">All Years</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                    <option value="2019">2019</option>
                    <option value="2018">2018</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-zinc-400 mb-2 tracking-widest">Type</label>
                <select id="type-filter" class="w-full p-2.5 bg-white border border-zinc-300 rounded-xl text-sm outline-none cursor-pointer focus:border-red-600">
                    <option value="all">All Types</option>
                    <option value="Article">Article</option>
                    <option value="Book">Book</option>
                    <option value="Podcast">Podcast</option>
                    <option value="Music">Music</option>
                    <option value="Video">Video</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-zinc-400 mb-2 tracking-widest">Category</label>
                <select id="category-filter" class="w-full p-2.5 bg-white border border-zinc-300 rounded-xl text-sm outline-none cursor-pointer focus:border-red-600">
                    <option value="all">All Categories</option>
                    <option value="history">History</option>
                    <option value="education policy">Education Policy</option>
                    <option value="educational reform">Educational Reform</option>
                    <option value="educational problems">Educational Problems</option>
                    <option value="educational equality">Educational Equality</option>
                    <option value="others">Others</option>
                </select>
            </div>

            <button onclick="location.reload()" class="mt-2 text-xs text-zinc-400 hover:text-red-600 transition-colors">
                Clear all filters
            </button>
        </div>
    </div>
</aside>

        <main id="content-start" class="w-full md:w-3/4 scroll-mt-28">
            <div class="mb-6 flex justify-between items-end">
                <h3 class="text-zinc-400 text-sm font-medium">Showing results...</h3>
            </div>

            <div id="card-list" class="grid grid-cols-1 gap-4 md:gap-6">
                </div>

            <div id="pagination" class="flex justify-center items-center gap-2 mt-12 pb-10">
                </div>
        </main>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
